services:
  db:
    image: pgvector/pgvector:pg18
    env_file:
      - ./config/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    command:
      - |
        cp /init/ollama-init.sh /tmp/
        chmod +x /tmp/ollama-init.sh
        /tmp/ollama-init.sh &
        /bin/ollama serve
    volumes:
      - ollama_/root/.ollama
      - ./scripts:/init:ro  
    deploy:
      resources:
        limits:
          memory: 4G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./config/.env
    depends_on:
      - db
      - ollama
    ports:
      - "8000:8000"
    volumes:
      - ./config:/config:ro 

volumes:
  postgres_:
  ollama_: