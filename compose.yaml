services:
  db:
    image: pgvector/pgvector:pg18
    env_file:
      - ./config/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_/root/.ollama
      - ./scripts/ollama-init.sh:/init/ollama-init.sh:ro  
    command: >
      sh -c "
        if [ -f /init/ollama-init.sh ]; then
          /init/ollama-init.sh &
        fi &&
        /bin/ollama serve
      "
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  postgres_:
  ollama_: